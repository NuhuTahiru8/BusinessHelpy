<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topnav" id="myTopnav">
        <a href="index.html">Home</a>
        <a href="template.html" class="active">Templates</a>
        <a href="index.html?mode=free" id="freeLink">FREE</a>
        <a class="whatsapp" href="https://chat.whatsapp.com/PASTE_INVITE_CODE_HERE" target="_blank" rel="noopener">WhatsApp</a>
        <a href="#contact">Contact</a>
        <a href="#about">About</a>
        <a href="javascript:void(0);" id="logoutLink" style="display:none;" onclick="logout()">Logout</a>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
        </a>
    </div>

    <div id="templates-page">
        <h1>Templates</h1>
        <div class="templates">
            <div class="flip-box">
                <div class="flip-box-inner">
                    <div class="flip-box-front">
                        <h2>Birthday Wish</h2>
                    </div>
                    <div class="flip-box-back">
                        <h4>Words can't express how grateful I am for your endless love and support.</h4>
                        <button class="use-template-button" onclick="useTemplate('Words can\\'t express how grateful I am for your endless love and support.')">Use Template</button>
                    </div>
                </div>
            </div>
            <div class="flip-box">
                <div class="flip-box-inner">
                    <div class="flip-box-front">
                        <h2>Happy Day</h2>
                    </div>
                    <div class="flip-box-back">
                        <h4>Hope your day is filled with happiness and joy!</h4>
                        <button class="use-template-button" onclick="useTemplate('Hope your day is filled with happiness and joy!')">Use Template</button>
                    </div>
                </div>
            </div>
        </div>

        <h2>Saved Templates</h2>
        <div id="templateStatus"></div>
        <div class="templates" id="dynamicTemplates"></div>
    </div>

    <script src="script.js"></script>
    <script>
        function myFunction() {
            var x = document.getElementById("myTopnav");
            if (x.className === "topnav") {
                x.className += " responsive";
            } else {
                x.className = "topnav";
            }
        }
    </script>
</body>
</html>
