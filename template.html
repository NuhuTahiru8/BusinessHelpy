<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topnav" id="myTopnav">
        <a href="index.html">Home</a>
        <a href="template.html" class="active">Templates</a>
        <a href="index.html?mode=subscription" id="subscriptionLink">Top up</a>
        <a href="index.html?mode=special" id="specialDayLink">Special Day</a>
        <a class="whatsapp" href="https://wa.me/233243951661?text=hi%2C%20i%27m%20messaging%20you%20from%20AyiSun%20platform." target="_blank" rel="noopener" aria-label="WhatsApp"><i class="fa fa-whatsapp"></i></a>
        <a href="index.html?mode=about" id="aboutLink">About</a>
        <a href="javascript:void(0);" id="logoutLink" style="display:none;" onclick="logout()">Logout</a>
        <span class="nav-balance" id="smsBalanceBadge" style="display:none;"></span>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
        </a>
    </div>

    <div id="templates-page">
        <h1>Templates</h1>
        <h2>Saved Templates</h2>
        <div id="templateStatus"></div>
        <div class="templates" id="dynamicTemplates"></div>

        <div id="adminTemplatesBox" style="display:none;">
            <div class="admin-title">Admin Templates</div>
            <div class="admin-card">
                <div class="admin-subtitle">Add Template</div>
                <input type="text" id="adminTemplateId" list="specialDayIds" placeholder="Template ID (pick Special Day ID)" autocomplete="off" />
                <datalist id="specialDayIds"></datalist>
                <textarea id="adminTemplateText" data-max-height="160" placeholder="Template message"></textarea>
                <button class="mini-button" id="addAdminTemplateBtn" onclick="addAdminTemplate()">Add Template</button>
                <div id="adminTemplateStatus"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function myFunction() {
            var x = document.getElementById("myTopnav");
            if (x.className === "topnav") {
                x.className += " responsive";
            } else {
                x.className = "topnav";
            }
        }
    </script>
</body>
</html>
